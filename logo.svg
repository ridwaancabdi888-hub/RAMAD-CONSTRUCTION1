<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e8fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d5fa0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1677C8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1677C8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon background rounded square -->
  <rect x="0" y="10" width="100" height="100" rx="18" fill="url(#blueGrad)" filter="url(#shadow)"/>

  <!-- Building / House combined icon -->
  <!-- Main tower -->
  <rect x="34" y="42" width="32" height="52" rx="2" fill="white" opacity="0.95"/>
  <!-- Tower top triangle -->
  <polygon points="50,20 28,44 72,44" fill="white"/>
  <!-- Rooftop accent line -->
  <line x1="50" y1="22" x2="50" y2="30" stroke="#7dd3fc" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Windows on tower -->
  <rect x="39" y="52" width="8" height="8" rx="1.5" fill="#1677C8" opacity="0.9"/>
  <rect x="53" y="52" width="8" height="8" rx="1.5" fill="#1677C8" opacity="0.9"/>
  <rect x="39" y="66" width="8" height="8" rx="1.5" fill="#1677C8" opacity="0.9"/>
  <rect x="53" y="66" width="8" height="8" rx="1.5" fill="#1677C8" opacity="0.9"/>

  <!-- Door -->
  <rect x="44" y="80" width="12" height="14" rx="6" fill="#7dd3fc" opacity="0.9"/>

  <!-- Ground line -->
  <line x1="8" y1="96" x2="92" y2="96" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

  <!-- Small building left -->
  <rect x="10" y="66" width="18" height="30" rx="2" fill="white" opacity="0.55"/>
  <polygon points="19,56 8,68 30,68" fill="white" opacity="0.55"/>
  <rect x="13" y="72" width="5" height="5" rx="1" fill="#1677C8" opacity="0.7"/>
  <rect x="22" y="72" width="5" height="5" rx="1" fill="#1677C8" opacity="0.7"/>

  <!-- Small building right -->
  <rect x="72" y="72" width="18" height="24" rx="2" fill="white" opacity="0.45"/>
  <polygon points="81,62 70,74 92,74" fill="white" opacity="0.45"/>

  <!-- RAMAD text -->
  <text x="118" y="68"
    font-family="'Georgia', 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
    letter-spacing="4"
    fill="#0a1628">RAMAD</text>

  <!-- Accent underline -->
  <rect x="118" y="76" width="280" height="3" rx="2" fill="url(#accentGrad)"/>

  <!-- Subtitle -->
  <text x="120" y="100"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="6"
    fill="#5E5E5E">CONSTRUCTION COMPANY</text>

  <!-- Small diamond accent -->
  <polygon points="108,78 112,74 116,78 112,82" fill="#1677C8" opacity="0.7"/>
</svg>
